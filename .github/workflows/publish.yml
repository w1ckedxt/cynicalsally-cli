name: Publish

# Trigger by pushing a version tag that matches package.json, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC auth for the MCP Registry (no stored registry secret)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (npm OIDC) requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          test "$TAG_VERSION" = "$PKG_VERSION" || { echo "::error::tag $TAG_VERSION != package.json $PKG_VERSION"; exit 1; }

      # npm auth via trusted publishing (OIDC) — configure once on npmjs.com:
      # package @cynicalsally/cli → Settings → Trusted Publisher → GitHub Actions,
      # repo w1ckedxt/cynical-sally, workflow publish.yml. No NPM_TOKEN needed.
      - name: Publish to npm
        run: npm publish --access public

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish
